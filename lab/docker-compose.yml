services:
  postgres-db:
    image: postgres:15-alpine
    container_name: kanban-postgres
    environment:
      postgres_user: admin
      postegres_passowrd: admin_password
      postegres_db: kanban_db
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  kanban-api:
    build: .
    container_name: kanban-bookend
    ports:
      - '8081:8081'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgres-db:5432/kanban_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin_password
      - SPRING_JPA_HIBERNATE_DOC_AUTO=update

    depends_on:
      - postgres-db
volumes:
  postgres-data: